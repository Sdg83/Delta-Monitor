<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DELTA Monitor PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#e0f0ff;
  background:url('IMG_9678.jpeg') center/cover no-repeat fixed;
}

body::after{
  content:'';
  position:fixed;
  inset:0;
  background:rgba(5,13,20,0.65);
}

.container{position:relative;z-index:2;padding:15px;max-width:900px;margin:auto;}
.card{background:rgba(0,0,0,0.55);border-radius:10px;padding:15px;margin-bottom:15px;}

.river{position:relative;height:320px;border-radius:10px;overflow:hidden;background:linear-gradient(to top,#6fb7d6,#3c7fa3);}
.water{position:absolute;bottom:0;width:100%;transition:1s;}

.water.low{background:#4da6ff;}
.water.mid{background:#e6c84f;}
.water.high{background:#d9534f;}

.waves{
  position:absolute;
  bottom:0;
  width:200%;
  height:50px;
  background:rgba(255,255,255,0.2);
  animation:wave 4s linear infinite;
}

@keyframes wave{from{transform:translateX(0);}to{transform:translateX(-50%);}}

.value{position:absolute;top:20px;left:20px;font-size:2.5rem;font-weight:900;}
.info{position:absolute;top:70px;left:20px;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.item{background:rgba(0,0,0,0.5);padding:10px;border-radius:8px;text-align:center;}
.big{font-size:1.4rem;}

.alert{
  margin-top:10px;
  font-weight:bold;
  padding:10px;
  border-radius:6px;
  text-align:center;
}
.alert.ok{background:#0f5132;}
.alert.warn{background:#664d03;}
.alert.danger{background:#842029;}
</style>
</head>

<body>

<div class="container">

<h2>🌊 DELTA Monitor PRO</h2>

<div class="card">
  <div class="river">
    <div class="water" id="water"></div>
    <div class="waves"></div>

    <div class="value" id="level">--</div>
    <div class="info" id="info">Cargando...</div>
  </div>

  <div class="alert ok" id="alert">Inicializando...</div>
</div>

<div class="grid">
  <div class="item">🌡️ Temp<div class="big" id="temp"></div></div>
  <div class="item">💧 Humedad<div class="big" id="hum"></div></div>
  <div class="item">💨 Viento<div class="big" id="wind"></div></div>
  <div class="item">🧭 Dirección<div class="big" id="dir"></div></div>
  <div class="item">🌧️ Lluvia<div class="big" id="rain"></div></div>
  <div class="item">📊 Tendencia<div class="big" id="trend"></div></div>
</div>

</div>

<script>
let lastLevel=null;
let lastAlert="";

/* sonido alerta */
function beep(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    o.type="sine";
    o.frequency.setValueAtTime(600,ctx.currentTime);
    o.connect(ctx.destination);
    o.start();
    setTimeout(()=>o.stop(),200);
  }catch{}
}

/* vibración */
function vibrate(){
  if(navigator.vibrate){
    navigator.vibrate([200,100,200]);
  }
}

function dirLabel(d){
  const dirs=["N","NE","E","SE","S","SO","O","NO"];
  return dirs[Math.round(d/45)%8];
}

async function getWeather(){
  const r = await fetch("https://api.open-meteo.com/v1/forecast?latitude=-34.426&longitude=-58.579&current=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m,wind_direction_10m,pressure_msl");
  return await r.json();
}

/* MODELO MEJORADO DELTA */
function calcLevel(p,w,dir){

  let level = 150;

  // presión
  level += (1015 - p) * 2;

  // viento fuerte
  if(w > 25) level += 15;

  // SUDESTADA REAL
  if(dir > 100 && dir < 160){
    level += w * 1.5;
  }

  return level;
}

async function update(){

  const data = await getWeather();
  const c = data.current;

  const level = calcLevel(c.pressure_msl,c.wind_speed_10m,c.wind_direction_10m);

  document.getElementById("level").innerText = Math.round(level)+" cm";

  const water = document.getElementById("water");
  water.style.height = Math.min(level/300*100,100)+"%";

  water.className="water";
  if(level<180) water.classList.add("low");
  else if(level<230) water.classList.add("mid");
  else water.classList.add("high");

  document.getElementById("temp").innerText = c.temperature_2m+"°C";
  document.getElementById("hum").innerText = c.relative_humidity_2m+"%";
  document.getElementById("wind").innerText = c.wind_speed_10m+" km/h";
  document.getElementById("dir").innerText = dirLabel(c.wind_direction_10m);
  document.getElementById("rain").innerText = c.precipitation+" mm";

  let trend="→";
  if(lastLevel!==null){
    if(level>lastLevel+2) trend="⬆️";
    else if(level<lastLevel-2) trend="⬇️";
  }
  lastLevel=level;
  document.getElementById("trend").innerText=trend;

  /* ALERTAS */
  let alert="Normal";
  let cls="ok";

  if(level>240){
    alert="🚨 Crecida fuerte";
    cls="danger";
  } else if(level<120){
    alert="⚠️ Bajante fuerte";
    cls="warn";
  } else if(c.wind_direction_10m>100 && c.wind_direction_10m<160 && c.wind_speed_10m>20){
    alert="🌬️ Sudestada";
    cls="warn";
  }

  const alertEl = document.getElementById("alert");
  alertEl.innerText = alert;
  alertEl.className="alert "+cls;

  /* notificación local */
  if(alert !== lastAlert){
    beep();
    vibrate();
    lastAlert = alert;
  }
}

update();
setInterval(update,10000);
</script>

</body>
</html>
