<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DELTA Monitor PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050d14;
  color:#e0f0ff;
}

.container{
  padding:15px;
  max-width:900px;
  margin:auto;
}

.card{
  background:#0a1825;
  border-radius:10px;
  padding:15px;
  margin-bottom:15px;
}

.river{
  position:relative;
  height:260px;
  border-radius:10px;
  overflow:hidden;
  background:linear-gradient(to top,#6fb7d6,#3c7fa3);
}

.water{
  position:absolute;
  bottom:0;
  width:100%;
  transition:1s;
  background:#4da6ff;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.item{
  background:#0f2233;
  padding:10px;
  border-radius:8px;
  text-align:center;
}

.big{font-size:1.6rem;}
.alert{font-weight:bold;margin-top:10px;}
</style>
</head>

<body>

<div class="container">

<h2>🌊 DELTA Monitor PRO</h2>

<div class="card">
  <div class="river">
    <div class="water" id="water"></div>
    <div style="position:absolute;top:20px;left:20px;font-size:2rem" id="level">Cargando...</div>
    <div style="position:absolute;top:60px;left:20px" id="source"></div>
  </div>
  <div class="alert" id="alert"></div>
</div>

<div class="grid">
  <div class="item">🌡️ Temp<div class="big" id="temp"></div></div>
  <div class="item">💨 Viento<div class="big" id="wind"></div></div>
  <div class="item">🧭 Dirección<div class="big" id="dir"></div></div>
  <div class="item">📊 Tendencia<div class="big" id="trend"></div></div>
</div>

</div>

<script>
let lastLevel=null;

/* DIRECCION */
function dirLabel(d){
  const dirs=["N","NE","E","SE","S","SO","O","NO"];
  return dirs[Math.round(d/45)%8];
}

/* WEATHER */
async function getWeather(){
  try{
    const r = await fetch("https://api.open-meteo.com/v1/forecast?latitude=-34.426&longitude=-58.579&current=temperature_2m,wind_speed_10m,wind_direction_10m,pressure_msl");
    return await r.json();
  }catch{
    return null;
  }
}

/* NIVEL ESTIMADO (SIEMPRE FUNCIONA) */
function calcLevel(p,w){
  return 140 + (1015-p)*2 + (w>25?15:0);
}

/* UPDATE */
async function update(){

  const data = await getWeather();

  if(!data || !data.current){
    document.getElementById("level").innerText="Sin datos";
    return;
  }

  const c = data.current;

  const level = calcLevel(c.pressure_msl, c.wind_speed_10m);

  document.getElementById("level").innerText = Math.round(level)+" cm";
  document.getElementById("source").innerText = "Estimado";

  /* AGUA */
  const water = document.getElementById("water");
  water.style.height = Math.min(level/300*100,100)+"%";

  /* CLIMA */
  document.getElementById("temp").innerText = c.temperature_2m+"°C";
  document.getElementById("wind").innerText = c.wind_speed_10m+" km/h";
  document.getElementById("dir").innerText = dirLabel(c.wind_direction_10m);

  /* TENDENCIA */
  let trend="→";
  if(lastLevel!==null){
    if(level>lastLevel+2) trend="⬆️";
    else if(level<lastLevel-2) trend="⬇️";
  }

  lastLevel=level;
  document.getElementById("trend").innerText = trend;

  /* ALERTAS */
  let alert="Normal";

  if(c.wind_direction_10m>100 && c.wind_direction_10m<160 && c.wind_speed_10m>20){
    alert="🌬️ Sudestada";
  }

  if(level>230){
    alert="🚨 Nivel alto";
  }

  document.getElementById("alert").innerText = alert;
}

update();
setInterval(update,10000);
</script>

</body>
</html>
