<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DELTA Monitor PRO</title>

<style>
:root{
  --text:#e0f0ff;
}

body{
  margin:0;
  font-family:Arial;
  color:var(--text);
  background:url('IMG_9678.jpeg') center/cover no-repeat fixed;
}

/* overlay oscuro */
body::after{
  content:'';
  position:fixed;
  inset:0;
  background:rgba(5,13,20,0.75);
  z-index:0;
}

.container{
  position:relative;
  z-index:2;
  padding:15px;
  max-width:900px;
  margin:auto;
}

.card{
  background:rgba(0,0,0,0.5);
  border-radius:10px;
  padding:15px;
  margin-bottom:15px;
}

/* ================= RÍO ================= */

.river{
  position:relative;
  height:260px;
  border-radius:10px;
  overflow:hidden;
  background:linear-gradient(to top,#6fb7d6,#3c7fa3);
}

/* AGUA */
.water{
  position:absolute;
  bottom:0;
  width:100%;
  height:30%;
  transition:1s;
  background:#4da6ff;
}

/* colores */
.water.low { background:#4da6ff; }
.water.mid { background:#e6c84f; }
.water.high{ background:#d9534f; }

/* OLAS SUAVES */
.water::after{
  content:'';
  position:absolute;
  top:-10px;
  left:0;
  width:200%;
  height:20px;
  background:rgba(255,255,255,0.2);
  animation:wave 4s linear infinite;
  border-radius:50%;
}

@keyframes wave{
  from{ transform:translateX(0); }
  to{ transform:translateX(-50%); }
}

/* MUELLE */
.dock{
  position:absolute;
  right:30px;
  bottom:0;
}

.deck{
  width:100px;
  height:15px;
  background:repeating-linear-gradient(
    90deg,
    #8b5a2b,
    #8b5a2b 8px,
    #6e4520 8px,
    #6e4520 16px
  );
}

.legs{
  width:100px;
  height:40px;
  background:#5a3a1f;
}

.ladder{
  position:absolute;
  left:-20px;
  bottom:0;
}

.ladder div{
  width:18px;
  height:3px;
  background:#3b2a1a;
  margin:6px 0;
}

/* TEXTO */
.value{
  position:absolute;
  top:20px;
  left:20px;
  font-size:2.5rem;
  font-weight:900;
}

.info{
  position:absolute;
  top:70px;
  left:20px;
  font-size:1.1rem;
}

.alert{
  margin-top:10px;
  font-weight:bold;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.item{
  background:rgba(0,0,0,0.5);
  padding:10px;
  border-radius:8px;
  text-align:center;
}

.big{
  font-size:1.6rem;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>🌊 DELTA Monitor PRO</h2>

<div class="card">
  <div class="river">

    <div class="water" id="water"></div>

    <div class="dock">
      <div class="deck"></div>
      <div class="legs"></div>
      <div class="ladder">
        <div></div><div></div><div></div><div></div>
      </div>
    </div>

    <div class="value" id="level">--</div>
    <div class="info" id="info">Cargando...</div>

  </div>

  <div class="alert" id="alert"></div>
</div>

<div class="grid">
  <div class="item">🌡️ Temp<div class="big" id="temp">--</div></div>
  <div class="item">💨 Viento<div class="big" id="wind">--</div></div>
  <div class="item">💧 Humedad<div class="big" id="hum">--</div></div>
  <div class="item">🌧️ Lluvia<div class="big" id="rain">--</div></div>
</div>

</div>

<script>
let lastLevel=null;
let lastTime=null;

async function getData(){
  try{
    const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=-34.426&longitude=-58.579&current=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m,pressure_msl");
    return await res.json();
  }catch(e){
    return null;
  }
}

function calcLevel(data){
  if(!data || !data.current) return lastLevel || 150;

  const p = data.current.pressure_msl || 1015;
  const r = data.current.precipitation || 0;
  const w = data.current.wind_speed_10m || 0;

  return 140 + (1015-p)*2 + r*10 + (w>25?15:0);
}

async function update(){
  const data = await getData();

  const level = calcLevel(data);
  const now = Date.now();

  let trend="→ Estable";
  let speed=0;

  if(lastLevel!==null){
    const diff = level-lastLevel;
    const hours = (now-lastTime)/3600000;
    speed = diff/hours;

    if(diff>2) trend="⬆️ Subiendo";
    if(diff<-2) trend="⬇️ Bajando";
  }

  lastLevel=level;
  lastTime=now;

  document.getElementById("level").innerText = Math.round(level)+" cm";
  document.getElementById("info").innerText = trend+" | "+speed.toFixed(1)+" cm/h";

  const water = document.getElementById("water");

  if(water){
    const pct = Math.min(level/300*100,100);
    water.style.height = pct + "%";

    water.classList.remove("low","mid","high");

    if(level < 180) water.classList.add("low");
    else if(level < 230) water.classList.add("mid");
    else water.classList.add("high");
  }

  let msg="✅ Normal";
  if(level>260) msg="🚨 Crecida fuerte";
  else if(level>220) msg="⚠️ Nivel alto";
  else if(speed>10) msg="⚠️ Subida rápida";

  document.getElementById("alert").innerText = msg;

  if(data && data.current){
    document.getElementById("temp").innerText = data.current.temperature_2m+"°C";
    document.getElementById("wind").innerText = data.current.wind_speed_10m+" km/h";
    document.getElementById("hum").innerText = data.current.relative_humidity_2m+"%";
    document.getElementById("rain").innerText = data.current.precipitation+" mm";
  }
}

update();
setInterval(update,10000);
</script>

</body>
</html>
