<script>
let lastLevel = null;
let lastTime = null;

// 📡 OBTENER DATOS REALES MEJORADOS
async function getRealLevel() {
  const lat = -34.426;
  const lon = -58.579;

  try {
    // clima actual
    const weather = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=pressure_msl,precipitation,wind_speed_10m`);
    const w = await weather.json();

    const pressure = w.current.pressure_msl;
    const rain = w.current.precipitation;
    const wind = w.current.wind_speed_10m;

    // modelo base del río (ajustado al delta)
    let baseLevel = 140;

    // 📈 efectos reales
    const pressureEffect = (1015 - pressure) * 2.5;   // baja presión = sube río
    const rainEffect = rain * 8;                      // lluvia suma
    const windEffect = wind > 25 ? 15 : 0;            // viento fuerte empuja agua

    const level = baseLevel + pressureEffect + rainEffect + windEffect;

    return level;

  } catch (e) {
    console.log("fallback activo");
    return lastLevel || 150;
  }
}

// 🔔 NOTIFICACIÓN
function notify(msg){
  if(Notification.permission==="granted"){
    new Notification(msg);
  }
}

// 🚀 UPDATE PRINCIPAL
async function update() {
  const level = await getRealLevel();
  const now = Date.now();

  let trend="→ Estable";
  let speed=0;

  if(lastLevel!==null){
    const diff = level - lastLevel;
    const hours = (now-lastTime)/3600000;
    speed = diff / hours;

    if(diff>2) trend="⬆️ Subiendo";
    else if(diff<-2) trend="⬇️ Bajando";
  }

  lastLevel = level;
  lastTime = now;

  // UI
  document.getElementById("level").textContent = level.toFixed(0)+" cm";
  document.getElementById("info").textContent =
    trend+" | "+speed.toFixed(1)+" cm/h";

  document.getElementById("water").style.height =
    Math.min(level/300*100,100)+"%";

  // 🚨 ALERTAS INTELIGENTES
  let alertMsg="";
  
  if(level > 260){
    alertMsg="🚨 CRECIDA FUERTE";
    notify(alertMsg);
  }
  else if(level > 220){
    alertMsg="⚠️ Nivel alto";
  }
  else if(speed > 10){
    alertMsg="⚠️ Subida rápida";
  }
  else{
    alertMsg="✅ Normal";
  }

  document.getElementById("alert").textContent = alertMsg;
}

// permisos iPhone
if("Notification" in window){
  Notification.requestPermission();
}

// auto refresh
update();
setInterval(update, 300000); // cada 5 min
</script>
