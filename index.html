<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DELTA Monitor PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#e0f0ff;
  background:url('IMG_9678.jpeg') center/cover no-repeat fixed;
}

body::after{
  content:'';
  position:fixed;
  inset:0;
  background:rgba(5,13,20,0.7);
}

.container{position:relative;z-index:2;padding:15px;max-width:900px;margin:auto;}
.card{background:rgba(0,0,0,0.55);border-radius:10px;padding:20px;margin-bottom:15px;text-align:center;}

/* PANEL PRINCIPAL */
.level{
  font-size:3.5rem;
  font-weight:900;
}

.status{
  font-size:1.4rem;
  margin-top:5px;
}

.trend{
  margin-top:8px;
  font-size:1rem;
}

.alert{
  margin-top:15px;
  padding:10px;
  border-radius:6px;
  font-weight:bold;
}

.ok{background:#0f5132;}
.warn{background:#664d03;}
.danger{background:#842029;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.item{
  background:rgba(0,0,0,0.5);
  padding:10px;
  border-radius:8px;
  text-align:center;
}

.big{font-size:1.3rem;}

</style>
</head>

<body>

<div class="container">

<h2>🌊 DELTA Monitor PRO</h2>

<!-- PANEL PRINCIPAL -->
<div class="card">
  <div class="level" id="level">--</div>
  <div class="status" id="status">Cargando...</div>
  <div class="trend" id="trend"></div>
  <div class="alert ok" id="alert">Inicializando...</div>
</div>

<!-- DATOS -->
<div class="grid">
  <div class="item">🌡️ Temp<div class="big" id="temp"></div></div>
  <div class="item">💧 Humedad<div class="big" id="hum"></div></div>
  <div class="item">💨 Viento<div class="big" id="wind"></div></div>
  <div class="item">🧭 Dirección<div class="big" id="dir"></div></div>
  <div class="item">🌧️ Lluvia<div class="big" id="rain"></div></div>
  <div class="item">📊 Tendencia<div class="big" id="trend2"></div></div>
</div>

<!-- PRONOSTICO -->
<div class="card">
  <h3>📅 Próximas horas</h3>
  <div id="forecast"></div>
</div>

</div>

<script>
let lastLevel=null;

function dirLabel(d){
  const dirs=["N","NE","E","SE","S","SO","O","NO"];
  return dirs[Math.round(d/45)%8];
}

async function getData(){
  const r = await fetch("https://api.open-meteo.com/v1/forecast?latitude=-34.426&longitude=-58.579&current=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m,wind_direction_10m,pressure_msl&hourly=temperature_2m,wind_speed_10m");
  return await r.json();
}

function calcLevel(p,w,dir){
  let level=150;

  level += (1015 - p) * 2;

  if(w > 25) level += 15;

  if(dir > 100 && dir < 160){
    level += w * 1.5; // sudestada
  }

  return level;
}

async function update(){

  const d = await getData();
  const c = d.current;

  const level = calcLevel(c.pressure_msl,c.wind_speed_10m,c.wind_direction_10m);

  document.getElementById("level").innerText = Math.round(level)+" cm";

  /* STATUS */
  let status="Nivel normal";
  if(level>240) status="🚨 Crecida";
  else if(level>200) status="⚠️ Nivel alto";
  else if(level<120) status="⚠️ Bajante";

  document.getElementById("status").innerText = status;

  /* TENDENCIA */
  let trendText="= Estable";
  let speed=0;

  if(lastLevel!==null){
    const diff = level - lastLevel;
    speed = diff;

    if(diff>2) trendText = `⬆️ Subiendo (+${speed.toFixed(1)} cm)`;
    else if(diff<-2) trendText = `⬇️ Bajando (${speed.toFixed(1)} cm)`;
    else trendText = `= Estable (${speed.toFixed(1)} cm)`;
  }

  lastLevel = level;

  document.getElementById("trend").innerText = trendText;
  document.getElementById("trend2").innerText = trendText;

  /* ALERTAS */
  let alert="Normal", cls="ok";

  if(level>240){ alert="🚨 Crecida fuerte"; cls="danger"; }
  else if(level<120){ alert="⚠️ Bajante fuerte"; cls="warn"; }
  else if(c.wind_direction_10m>100 && c.wind_direction_10m<160 && c.wind_speed_10m>20){
    alert="🌬️ Sudestada"; cls="warn";
  }

  const alertEl = document.getElementById("alert");
  alertEl.innerText = alert;
  alertEl.className = "alert "+cls;

  /* CLIMA */
  document.getElementById("temp").innerText = c.temperature_2m+"°C";
  document.getElementById("hum").innerText = c.relative_humidity_2m+"%";
  document.getElementById("wind").innerText = c.wind_speed_10m+" km/h";
  document.getElementById("dir").innerText = dirLabel(c.wind_direction_10m);
  document.getElementById("rain").innerText = c.precipitation+" mm";

  /* PRONOSTICO */
  const hours = d.hourly.time.slice(0,8);
  const temps = d.hourly.temperature_2m.slice(0,8);

  document.getElementById("forecast").innerHTML =
    hours.map((h,i)=>`${new Date(h).getHours()}h ${temps[i]}°`).join(" | ");
}

update();
setInterval(update,10000);
</script>

</body>
</html>
