<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DELTA Monitor PRO REAL</title>

<style>
body{margin:0;font-family:Arial;background:#050d14;color:#e0f0ff;}
.container{padding:15px;max-width:900px;margin:auto;}
.card{background:#0a1825;border-radius:10px;padding:15px;margin-bottom:15px;}

.river{position:relative;height:280px;border-radius:10px;overflow:hidden;background:linear-gradient(to top,#6fb7d6,#3c7fa3);}
.water{position:absolute;bottom:0;width:100%;transition:1s;background:#4da6ff;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.item{background:#0f2233;padding:10px;border-radius:8px;text-align:center;}
.big{font-size:1.6rem;}
.alert{font-weight:bold;margin-top:10px;}
#map{height:250px;border-radius:10px;}
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>

<body>

<div class="container">

<h2>🌊 DELTA Monitor PRO REAL</h2>

<div class="card">
  <div class="river">
    <div class="water" id="water"></div>
    <div style="position:absolute;top:20px;left:20px;font-size:2rem" id="level">--</div>
    <div style="position:absolute;top:60px;left:20px" id="source">--</div>
  </div>
  <div class="alert" id="alert"></div>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<div class="card">
  <div id="map"></div>
</div>

<div class="grid">
  <div class="item">🌡️ Temp<div class="big" id="temp"></div></div>
  <div class="item">💨 Viento<div class="big" id="wind"></div></div>
  <div class="item">🧭 Dirección<div class="big" id="dir"></div></div>
  <div class="item">📊 Predominante<div class="big" id="dominant"></div></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let history = JSON.parse(localStorage.getItem("riverHistory") || []);

/* MAPA */
const map = L.map('map').setView([-34.426,-58.579],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
L.marker([-34.426,-58.579]).addTo(map);

/* DIRECCION */
function dirLabel(d){
  const dirs=["N","NE","E","SE","S","SO","O","NO"];
  return dirs[Math.round(d/45)%8];
}

/* DOMINANTE */
function dominant(){
  if(history.length<5) return "-";
  const avg = history.reduce((a,b)=>a+b.dir,0)/history.length;
  return dirLabel(avg);
}

/* SUDESTADA */
function sudestada(dir, wind){
  return (dir>100 && dir<160 && wind>20) ? "🌬️ Sudestada probable" : "Normal";
}

/* WEATHER */
async function getWeather(){
  const r = await fetch("https://api.open-meteo.com/v1/forecast?latitude=-34.426&longitude=-58.579&current=temperature_2m,wind_speed_10m,wind_direction_10m,pressure_msl");
  return r.json();
}

/* INA REAL (proxy público alternativo) */
async function getRiverReal(){
  try{
    const r = await fetch("https://hidro.ina.gob.ar/api/observaciones?estacion=34"); 
    const j = await r.json();
    return j[0]?.valor || null;
  }catch{
    return null;
  }
}

/* fallback */
function calcLevel(p,w){
  return 140 + (1015-p)*2 + (w>25?15:0);
}

/* CHART */
const chart = new Chart(document.getElementById("chart"),{
  type:"line",
  data:{labels:[],datasets:[{label:"Nivel",data:[]}]}
});

async function update(){

  const weather = await getWeather();
  const c = weather.current;

  let level = await getRiverReal();
  let source="📡 INA (real)";

  if(!level){
    level = calcLevel(c.pressure_msl, c.wind_speed_10m);
    source="⚠️ Estimado";
  }

  document.getElementById("level").innerText = level.toFixed(0)+" cm";
  document.getElementById("source").innerText = source;

  document.getElementById("temp").innerText = c.temperature_2m+"°C";
  document.getElementById("wind").innerText = c.wind_speed_10m+" km/h";
  document.getElementById("dir").innerText = dirLabel(c.wind_direction_10m);

  const water = document.getElementById("water");
  water.style.height = Math.min(level/300*100,100)+"%";

  history.push({level,dir:c.wind_direction_10m});
  if(history.length>50) history.shift();

  localStorage.setItem("riverHistory", JSON.stringify(history));

  chart.data.labels = history.map((_,i)=>i);
  chart.data.datasets[0].data = history.map(h=>h.level);
  chart.update();

  document.getElementById("dominant").innerText = dominant();
  document.getElementById("alert").innerText = sudestada(c.wind_direction_10m, c.wind_speed_10m);
}

update();
setInterval(update,10000);
</script>

</body>
</html>
