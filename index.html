<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DELTA Monitor PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#e0f0ff;
  background:url('IMG_9678.jpeg') center/cover no-repeat fixed;
}

body::after{
  content:'';
  position:fixed;
  inset:0;
  background:rgba(5,13,20,0.65);
  z-index:0;
}

.container{
  position:relative;
  z-index:2;
  padding:15px;
  max-width:900px;
  margin:auto;
}

.card{
  background:rgba(0,0,0,0.55);
  border-radius:10px;
  padding:15px;
  margin-bottom:15px;
}

/* RIO */
.river{
  position:relative;
  height:320px;
  border-radius:10px;
  overflow:hidden;
  background:linear-gradient(to top,#6fb7d6,#3c7fa3);
}

.water{
  position:absolute;
  bottom:0;
  width:100%;
  transition:1s;
}

.water.low{ background:#4da6ff; }
.water.mid{ background:#e6c84f; }
.water.high{ background:#d9534f; }

.waves{
  position:absolute;
  bottom:0;
  width:200%;
  height:50px;
  background:rgba(255,255,255,0.2);
  animation:wave 4s linear infinite;
}

@keyframes wave{
  from{transform:translateX(0);}
  to{transform:translateX(-50%);}
}

/* MUELLE */
.dock{
  position:absolute;
  right:60px;
  bottom:0;
}

.deck{
  width:160px;
  height:25px;
  background:repeating-linear-gradient(90deg,#8b5a2b 0,#8b5a2b 12px,#6e4520 12px,#6e4520 24px);
}

.legs{
  width:160px;
  height:120px;
  background:linear-gradient(#6e4520,#3e2613);
}

.ladder{
  position:absolute;
  left:-30px;
  bottom:0;
}

.step{
  width:22px;
  height:4px;
  background:#3b2a1a;
  margin:10px 0;
  position:relative;
}

.step::after{
  content:attr(data-cm);
  position:absolute;
  left:30px;
  font-size:10px;
}

/* TEXTOS */
.value{
  position:absolute;
  top:20px;
  left:20px;
  font-size:2.5rem;
  font-weight:900;
}

.info{
  position:absolute;
  top:70px;
  left:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.item{
  background:rgba(0,0,0,0.5);
  padding:10px;
  border-radius:8px;
  text-align:center;
}

.big{font-size:1.4rem;}

.alert{margin-top:10px;font-weight:bold;}

/* PRONOSTICO */
.forecast{
  display:flex;
  overflow-x:auto;
  gap:8px;
}

.fitem{
  background:rgba(0,0,0,0.5);
  padding:6px;
  border-radius:6px;
  min-width:60px;
  text-align:center;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<h2>🌊 DELTA Monitor PRO</h2>

<div class="card">
  <div class="river">
    <div class="water" id="water"></div>
    <div class="waves"></div>

    <div class="dock">
      <div class="deck"></div>
      <div class="legs"></div>
      <div class="ladder">
        <div class="step" data-cm="0"></div>
        <div class="step" data-cm="50"></div>
        <div class="step" data-cm="100"></div>
        <div class="step" data-cm="150"></div>
        <div class="step" data-cm="200"></div>
        <div class="step" data-cm="250"></div>
      </div>
    </div>

    <div class="value" id="level">--</div>
    <div class="info" id="info">Cargando...</div>
  </div>

  <div class="alert" id="alert"></div>
</div>

<div class="grid">
  <div class="item">🌡️ Temp<div class="big" id="temp"></div></div>
  <div class="item">💧 Humedad<div class="big" id="hum"></div></div>
  <div class="item">💨 Viento<div class="big" id="wind"></div></div>
  <div class="item">🧭 Dirección<div class="big" id="dir"></div></div>
  <div class="item">🌧️ Lluvia<div class="big" id="rain"></div></div>
  <div class="item">📊 Tendencia<div class="big" id="trend"></div></div>
</div>

<div class="card">
  <h3>📅 Pronóstico próximas horas</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
let lastLevel=null;

function dirLabel(d){
  const dirs=["N","NE","E","SE","S","SO","O","NO"];
  return dirs[Math.round(d/45)%8];
}

async function getWeather(){
  const r = await fetch("https://api.open-meteo.com/v1/forecast?latitude=-34.426&longitude=-58.579&current=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m,wind_direction_10m,pressure_msl&hourly=temperature_2m,precipitation_probability&forecast_days=2");
  return await r.json();
}

function calcLevel(p,w){
  return 140 + (1015-p)*2 + (w>25?15:0);
}

async function update(){

  const data = await getWeather();
  const c = data.current;

  const level = calcLevel(c.pressure_msl,c.wind_speed_10m);

  document.getElementById("level").innerText = Math.round(level)+" cm";

  const water = document.getElementById("water");
  water.style.height = Math.min(level/300*100,100)+"%";

  water.className="water";
  if(level<180) water.classList.add("low");
  else if(level<230) water.classList.add("mid");
  else water.classList.add("high");

  document.getElementById("temp").innerText = c.temperature_2m+"°C";
  document.getElementById("hum").innerText = c.relative_humidity_2m+"%";
  document.getElementById("wind").innerText = c.wind_speed_10m+" km/h";
  document.getElementById("dir").innerText = dirLabel(c.wind_direction_10m);
  document.getElementById("rain").innerText = c.precipitation+" mm";

  let trend="→";
  if(lastLevel!==null){
    if(level>lastLevel+2) trend="⬆️";
    else if(level<lastLevel-2) trend="⬇️";
  }
  lastLevel=level;
  document.getElementById("trend").innerText=trend;

  let alert="✅ Normal";
  if(c.wind_direction_10m>100 && c.wind_direction_10m<160 && c.wind_speed_10m>20){
    alert="🌬️ Sudestada";
  }
  if(level>230){
    alert="🚨 Crecida";
  }
  document.getElementById("alert").innerText=alert;

  /* PRONOSTICO */
  const fc = document.getElementById("forecast");
  fc.innerHTML="";

  for(let i=0;i<12;i++){
    fc.innerHTML += `
      <div class="fitem">
        ${data.hourly.time[i].slice(11,16)}<br>
        ${data.hourly.temperature_2m[i]}°<br>
        ${data.hourly.precipitation_probability[i]}%
      </div>
    `;
  }
}

update();
setInterval(update,10000);
</script>

</body>
</html>
